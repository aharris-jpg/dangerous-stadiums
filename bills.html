<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>Buffalo Bills Stadium</title>

<style>
:root {
  --bg: #eef2f7;
  --card: #ffffff;
  --navy: #0f2747;
  --red: #c9272e;
  --gold: #d6ab2f;
  --line: #dbe3ee;
  --text: #12233f;
  --muted: #6c7a8f;
}

body {
  margin: 0;
  padding: 40px;
  background: var(--bg);
  font-family: Arial, sans-serif;
}

.wrap {
  max-width: 900px;
  margin: auto;
}

.card {
  background: var(--card);
  border-radius: 22px;
  overflow: hidden;
  border: 1px solid var(--line);
  box-shadow: 0 20px 50px rgba(10, 30, 60, 0.12);
}

.header {
  padding: 16px 18px;
  background: linear-gradient(90deg, var(--navy), var(--red));
  color: #fff;
}

.title {
  font-size: 18px;
  font-weight: 800;
  margin: 0;
}

.image-wrap {
  position: relative;
  background: #000;
}

.image-wrap img {
  width: 100%;
  display: block;
}

/* Optional score badge */
.score-badge {
  position: absolute;
  bottom: 14px;
  right: 14px;
  background: var(--gold);
  color: #12233f;
  font-size: 14px;
  font-weight: 900;
  padding: 8px 12px;
  border-radius: 10px;
}

.caption {
  padding: 14px 18px;
  font-size: 13px;
  color: var(--muted);
  border-top: 1px solid var(--line);
  line-height: 1.4;
}

.caption strong {
  color: var(--text);
}
</style>
</head>

<body>

<div class="wrap">
  <div class="card">

    <div class="header">
      <h2 class="title">Buffalo Bills — Highmark Stadium</h2>
    </div>

    <div class="image-wrap">
      <img 
        src="https://static.wixstatic.com/media/d50ee7_8fd5a37c775f404ebc08af480c42cae1~mv2.jpg/v1/fill/w_1000,h_563,al_c,q_85,usm_0.66_1.00_0.01/d50ee7_8fd5a37c775f404ebc08af480c42cae1~mv2.jpg" 
        alt="Highmark Stadium Buffalo Bills"
      >

      <div class="score-badge">#1 NFL • 93.31</div>
    </div>

    <div class="caption">
      <strong>Source:</strong> Buffalo Bills / stadium media.<br>
      Highmark Stadium ranked as the most dangerous venue for visiting teams in Canada Sports Betting’s 2026 index, combining a perfect home win rate with near-capacity crowds throughout the 2024 season.
    </div>

  </div>
</div>

</body>
</html>
